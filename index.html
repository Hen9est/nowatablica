<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablica Szkolna</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2435;
    --border: rgba(255,255,255,0.07);
    --text: #f0f2f8;
    --muted: rgba(240,242,248,0.45);
    --accent: #f5c542;
    --accent2: #5b8dee;
    --green: #3ecf8e;
    --red: #f06060;
    --radius: 20px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  /* ── VIEWS ── */
  #app { width: 100vw; height: 100vh; position: relative; }

  .view {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity .7s ease;
  }
  .view.active { opacity: 1; pointer-events: all; }

  /* ── VIEW A: ZEGAR + SZCZĘŚLIWY NUMER ── */
  #view-a {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0;
  }

  #panel-clock {
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 6vw 5vw 6vw 6vw;
    border-right: 1px solid var(--border);
    background: var(--bg);
    gap: 1.5vh;
  }

  #dayofweek {
    font-size: clamp(14px, 1.6vw, 28px);
    font-weight: 400;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .15em;
  }

  #current-date {
    font-size: clamp(18px, 2.2vw, 38px);
    font-weight: 500;
    color: var(--text);
    letter-spacing: -.01em;
  }

  #current-time {
    font-family: var(--mono);
    font-size: clamp(52px, 9vw, 148px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -.04em;
    line-height: 1;
    margin-top: 1vh;
  }

  #time-dot {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  #vacation-box {
    margin-top: 3vh;
    display: flex; flex-direction: column; gap: 6px;
  }
  #vacation-label {
    font-size: 20px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .15em;
  }
  #vacation-count {
    display: flex; align-items: baseline; gap: .35em;
  }
  #vacation-days {
    font-family: var(--mono);
    font-size: clamp(28px, 4vw, 64px);
    font-weight: 400;
    color: var(--accent2);
    line-height: 1;
  }
  #vacation-unit {
    font-size: clamp(14px, 1.4vw, 22px);
    color: var(--muted);
    font-weight: 400;
  }
  #vacation-bar-wrap {
    width: clamp(120px, 16vw, 280px);
    height: 4px;
    background: rgba(255,255,255,.07);
    border-radius: 2px;
    overflow: hidden;
  }
  #vacation-bar {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    transition: width 1s ease;
  }

  #panel-lucky {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 6vw 5vw;
    background: var(--bg2);
    gap: 2.5vh;
  }

  .lucky-label {
    font-size: clamp(12px, 1.2vw, 20px);
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .2em;
  }

  #lucky-number {
    font-family: var(--mono);
    font-size: clamp(80px, 16vw, 240px);
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -.05em;
    display: block;
    opacity: 1;
  }

  #lucky-number.animate {
    animation: popIn .45s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes popIn {
    0% { transform: scale(.7); }
    100% { transform: scale(1); }
  }

  #dice-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    max-width: 260px;
  }

  .dice {
    width: 44px; height: 44px;
    background: var(--bg3);
    border: 1.5px solid rgba(245,197,66,.25);
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
    padding: 5px;
    gap: 0;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    align-self: center; justify-self: center;
  }
  .dice.value-1 .dot { grid-area: 2/2; }
  .dice.value-2 .dot:nth-child(1){grid-area:1/1} .dice.value-2 .dot:nth-child(2){grid-area:3/3}
  .dice.value-3 .dot:nth-child(1){grid-area:1/1} .dice.value-3 .dot:nth-child(2){grid-area:2/2} .dice.value-3 .dot:nth-child(3){grid-area:3/3}
  .dice.value-4 .dot:nth-child(1){grid-area:1/1} .dice.value-4 .dot:nth-child(2){grid-area:1/3} .dice.value-4 .dot:nth-child(3){grid-area:3/1} .dice.value-4 .dot:nth-child(4){grid-area:3/3}
  .dice.value-5 .dot:nth-child(1){grid-area:1/1} .dice.value-5 .dot:nth-child(2){grid-area:1/3} .dice.value-5 .dot:nth-child(3){grid-area:2/2} .dice.value-5 .dot:nth-child(4){grid-area:3/1} .dice.value-5 .dot:nth-child(5){grid-area:3/3}
  .dice.value-6 .dot:nth-child(1){grid-area:1/1} .dice.value-6 .dot:nth-child(2){grid-area:1/3} .dice.value-6 .dot:nth-child(3){grid-area:2/1} .dice.value-6 .dot:nth-child(4){grid-area:2/3} .dice.value-6 .dot:nth-child(5){grid-area:3/1} .dice.value-6 .dot:nth-child(6){grid-area:3/3}

  /* Gear button */
  #gear-btn {
    position: fixed; top: 20px; right: 20px;
    z-index: 200;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: color .2s, background .2s;
  }
  #gear-btn:hover { color: var(--text); background: var(--bg2); }
  #gear-btn svg { width: 20px; height: 20px; fill: currentColor; }

  /* ── EDITOR ── */
  #editor-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: none;
    align-items: center; justify-content: center;
  }
  #editor-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    width: 92%;
    max-width: 640px;
    max-height: 88vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .ed-head {
    display: flex; justify-content: space-between; align-items: center;
  }
  .ed-head h2 { font-size: 18px; font-weight: 600; }
  .ed-close {
    background: var(--bg3); border: none; border-radius: 10px;
    width: 34px; height: 34px; color: var(--text); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .ed-selectors { display: flex; gap: 10px; }
  .ed-selectors select {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    color: var(--text); font-family: var(--font); font-size: 14px;
    cursor: pointer;
  }
  .ed-fact {
    background: var(--bg3);
    border-left: 3px solid var(--accent2);
    border-radius: 12px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ed-fact label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 600; }
  .ed-fact input, .ed-fact textarea {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    width: 100%;
  }
  .ed-fact textarea { height: 52px; resize: none; }
  .ed-ai { font-size: 11px; color: var(--green); font-style: italic; }
  .ed-save {
    background: var(--accent2); color: #fff;
    border: none; border-radius: 12px;
    padding: 14px; font-family: var(--font);
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .ed-save:hover { opacity: .85; }

  /* tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    z-index: 300; width: 240px;
    flex-direction: column; gap: 14px;
  }
  #tweaks-panel h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; }
  .tweak-row label { font-size: 12px; color: var(--muted); }
  .tweak-row input[type=range] { width: 100%; accent-color: var(--accent2); }
  .tweak-row select {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; color: var(--text);
    font-family: var(--font); font-size: 13px;
  }
</style>
<template id="__bundler_thumbnail" data-bg-color="#1a0a2e">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1a0a2e"/>
    <rect x="0" y="0" width="600" height="800" fill="#120820"/>
    <text x="80" y="260" font-family="monospace" font-size="180" fill="white" opacity="0.9">08:30</text>
    <text x="80" y="340" font-family="monospace" font-size="36" fill="white" opacity="0.4">PONIEDZIAŁEK</text>
    <text x="1060" y="180" font-family="monospace" font-size="22" fill="#f06060" opacity="0.7" text-anchor="middle">SZCZĘŚLIWY</text>
    <text x="1060" y="320" font-family="monospace" font-size="240" fill="#f5c542" text-anchor="middle" opacity="0.95">9</text>
    <rect x="80" y="560" width="300" height="4" rx="2" fill="#f06060" opacity="0.3"/>
    <rect x="80" y="560" width="200" height="4" rx="2" fill="#f06060"/>
  </svg>
</template>
</head>
<body>

<div id="app">
  <!-- VIEW A: ZEGAR + LICZBA -->
  <div id="view-a" class="view active" data-screen-label="Zegar i Szczęśliwy Numer">
    <div id="panel-clock">
      <div id="dayofweek">Poniedziałek</div>
      <div id="current-date">20 Kwietnia 2026</div>
      <div id="current-time"><span id="time-h">00</span><span id="time-dot">:</span><span id="time-m">00</span><span style="opacity:.5">:</span><span id="time-s" style="font-size:.55em;opacity:.5;vertical-align:middle">00</span></div>
      <div id="vacation-box">
        <div id="vacation-label">Do wakacji</div>
        <div id="vacation-count">
          <span id="vacation-days">—</span>
          <span id="vacation-unit">dni</span>
        </div>
        <div id="vacation-bar-wrap"><div id="vacation-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div id="panel-lucky">
      <div class="lucky-label">Szczęśliwy numer</div>
      <div id="lucky-number">?</div>
      <div id="dice-row"></div>
    </div>
  </div>

</div>

<!-- GEAR -->
<button id="gear-btn" title="Edytor wydarzeń">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<!-- TWEAKS -->
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>Kolor akcentu</label>
    <select id="tweak-accent">
      <option value="#5b8dee">Niebieski</option>
      <option value="#3ecf8e">Zielony</option>
      <option value="#f06060">Czerwony</option>
      <option value="#c084fc">Fioletowy</option>
      <option value="#fb923c">Pomarańczowy</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Tło</label>
    <select id="tweak-bg">
      <option value="#0f1117">Bardzo ciemne</option>
      <option value="#111827">Ciemne (szary)</option>
      <option value="#0d1b2a">Granatowe</option>
      <option value="#1a0a2e">Fioletowe</option>
    </select>
  </div>
</div>

<!-- EDITOR -->
<div id="editor-overlay">
  <div id="editor-box">
    <div class="ed-head">
      <h2>Edytor Wydarzeń 2026</h2>
      <button class="ed-close" id="ed-close">✕</button>
    </div>
    <div class="ed-selectors">
      <select id="sel-month">
        <option value="01">Styczeń</option><option value="02">Luty</option>
        <option value="03">Marzec</option><option value="04">Kwiecień</option>
        <option value="05">Maj</option><option value="06">Czerwiec</option>
        <option value="07">Lipiec</option><option value="08">Sierpień</option>
        <option value="09">Wrzesień</option><option value="10">Październik</option>
        <option value="11">Listopad</option><option value="12">Grudzień</option>
      </select>
      <select id="sel-day"></select>
    </div>
    <div id="ed-list"></div>
    <button class="ed-save" id="ed-save">Zapisz zmiany</button>
  </div>
</div>

  [3,5,17,1,9,14,6,8,12,4,10,15,2,13,7,11,18,16],
  [10,4,15,2,13,7,1,18,9,16,5,11,17,3,8,14,6,12],

  [9,1,14,6,10,16,3,13,4,17,7,12,15,2,11,18,8,5],
  [2,15,8,11,4,7,13,18,6,10,16,3,14,9,1,12,5,17],
  [14,3,10,12,5,17,7,4,13,9,1,18,2,8,15,6,11,16],
  [11,16,6,1,8,15,9,3,12,14,17,5,13,7,2,10,18,4],
  [4,18,7,13,2,10,1,16,8,15,6,11,12,5,17,9,14,3]
];
const START = new Date('2025-10-25T00:00:00Z');

function getLucky() {
  const now = new Date();
  const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const startUTC = Date.UTC(START.getFullYear(), START.getMonth(), START.getDate());
  let d = Math.floor((todayUTC - startUTC) / 86400000);
  if (d < 0) d = (d % 180 + 180) % 180;
  return BAGS[Math.floor((d % 180) / 18)][d % 18];
}

function renderDice(n) {
  const row = document.getElementById('dice-row');
  row.innerHTML = '';
  let rem = n;
  while (rem > 0) {
    const v = Math.min(rem, 6); rem -= v;
    const d = document.createElement('div');
    d.className = `dice value-${v}`;
    for (let i = 0; i < v; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      d.appendChild(dot);
    }
    row.appendChild(d);
  }
}

function updateLucky() {
  const n = getLucky();
  const el = document.getElementById('lucky-number');
  el.textContent = n;
  el.classList.remove('animate');
  void el.offsetWidth;
  el.classList.add('animate');
  renderDice(n);
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('time-h').textContent = h;
  document.getElementById('time-m').textContent = m;
  document.getElementById('time-s').textContent = s;
  document.getElementById('current-date').textContent = now.toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});
  document.getElementById('dayofweek').textContent = now.toLocaleDateString('pl-PL', {weekday:'long'});
}

// ── EDITOR ──
const overlay = document.getElementById('editor-overlay');
const selM = document.getElementById('sel-month');
const selD = document.getElementById('sel-day');

function populateDays() {
  const days = new Date(2026, parseInt(selM.value), 0).getDate();
  selD.innerHTML = '';
  for (let i = 1; i <= days; i++) selD.add(new Option(i, i.toString().padStart(2,'0')));
}

function loadEditor() {
  const key = `${selM.value}-${selD.value}`;
  const data = DB[key] || [{y:'',t:'',img:''},{y:'',t:'',img:''},{y:'',t:'',img:''}];
  const list = document.getElementById('ed-list');
  list.innerHTML = '';
  data.slice(0,3).forEach((ev, i) => {
    const div = document.createElement('div');
    div.className = 'ed-fact';
    div.innerHTML = `
      <label>Fakt ${i+1}</label>
      <input class="ey" placeholder="Rok / skrót" value="${ev.y||''}">
      <textarea class="et" placeholder="Treść ciekawostki...">${ev.t||''}</textarea>
      <input class="ei" placeholder="URL obrazka (opcjonalnie)" value="${ev.img||''}">
    `;
    list.appendChild(div);
  });
}

document.getElementById('gear-btn').onclick = () => {
  const now = new Date();
  selM.value = (now.getMonth()+1).toString().padStart(2,'0');
  populateDays();
  selD.value = now.getDate().toString().padStart(2,'0');
  loadEditor();
  overlay.style.display = 'flex';
};
document.getElementById('ed-close').onclick = () => overlay.style.display = 'none';
overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none'; };
selM.onchange = () => { populateDays(); loadEditor(); };
selD.onchange = loadEditor;

document.getElementById('ed-save').onclick = () => {
  const key = `${selM.value}-${selD.value}`;
  const ey = document.querySelectorAll('.ey');
  const et = document.querySelectorAll('.et');
  const ei = document.querySelectorAll('.ei');
  const res = [];
  for (let i = 0; i < ey.length; i++) {
    if (ey[i].value || et[i].value) res.push({y: ey[i].value, t: et[i].value, img: ei[i].value});
  }
  DB[key] = res;
  const overrides = JSON.parse(localStorage.getItem('school_db') || '{}');
  overrides[key] = res;
  localStorage.setItem('school_db', JSON.stringify(overrides));
  overlay.style.display = 'none';
};

const VACATION_START = new Date('2026-06-20T00:00:00'); // Pierwszy dzień wakacji
const SCHOOL_START   = new Date('2026-09-01T00:00:00'); // Powrót do szkoły

function updateVacation() {
  const now = new Date();
  const msDay = 86400000;

  // If it's vacation time already
  if (now >= VACATION_START && now < SCHOOL_START) {
    document.getElementById('vacation-label').textContent = 'Wakacje!';
    document.getElementById('vacation-days').textContent = '🏖';
    document.getElementById('vacation-unit').textContent = '';
    document.getElementById('vacation-bar').style.width = '100%';
    return;
  }

  // Count days to vacation
  const target = now < VACATION_START ? VACATION_START : VACATION_START;
  const daysLeft = Math.ceil((target - now) / msDay);

  // Progress: school year starts Sept 1, ends June 20 (~293 days)
  const yearLen = (VACATION_START - SCHOOL_START) / msDay + 365; // approx
  const elapsed = (now - new Date('2025-09-01T00:00:00')) / msDay;
  const pct = Math.min(100, Math.max(0, (elapsed / (293)) * 100));

  document.getElementById('vacation-label').textContent = 'Do wakacji';
  document.getElementById('vacation-days').textContent = daysLeft;
  document.getElementById('vacation-unit').textContent = daysLeft === 1 ? 'dzień' : 'dni';
  document.getElementById('vacation-bar').style.width = pct.toFixed(1) + '%';
}

// ── INIT ──
applyTweaks();
updateClock();
updateVacation();
updateLucky();
setInterval(() => { updateClock(); updateVacation(); }, 1000);
</script>
